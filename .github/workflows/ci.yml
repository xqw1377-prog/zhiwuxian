name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint --if-present
      - run: npm test -- --reporter=verbose
      - uses: davelosert/vitest-coverage-report@v2
        if: always()

  frontend-build:
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build frontend
        run: npm run build:web
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: wuxian/zhi-cockpit:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-p0:
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    services:
      sqlite:
        image: nouchka/sqlite3:latest
        options: --entrypoint tail
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: |
          cp src/.env.example src/.env
          npx tsx server/index.ts &
          sleep 3
          npx tsx scripts/e2e-p0.ts
        env:
          NODE_ENV: test
          PORT: 3401
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || '' }}

  e2e-extended:
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run extended E2E suite
        run: |
          cp src/.env.example src/.env
          npx tsx server/index.ts &
          sleep 3
          npx tsx scripts/e2e-user-journey.ts
          npx tsx scripts/e2e-auth-prod.ts
        env:
          NODE_ENV: test
          PORT: 3402
          WUXIAN_AUTH_RELAXED: "1"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || '' }}
