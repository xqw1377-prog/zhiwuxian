version: '3.8'

networks:
  wuxian-net:
    driver: bridge

volumes:
  wuxian-data:
  wuxian-shares:
  certbot-www:
  certbot-conf:

services:
  wuxian-core:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        INSTALL_YTDLP: ${INSTALL_YTDLP:-1}
    container_name: wuxian-core
    networks:
      - wuxian-net
    expose:
      - "3401"
    environment:
      NODE_ENV: production
      PORT: 3401
      WUXIAN_DATA_DIR: /app/data
      WUXIAN_SHARES_DIR: /app/public/shares
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      WUXIAN_DEEPSEEK_MODEL: ${WUXIAN_DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      WUXIAN_DEEPSEEK_REASONER_MODEL: ${WUXIAN_DEEPSEEK_REASONER_MODEL:-deepseek-reasoner}
      QWEN_API_KEY: ${QWEN_API_KEY}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      WUXIAN_QWEN_VISION_MODEL: ${WUXIAN_QWEN_VISION_MODEL:-qwen-vl-max}
      WUXIAN_CORS_ORIGIN: ${WUXIAN_CORS_ORIGIN:-https://your-domain.com}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY}
      WUXIAN_SESSION_TTL_DAYS: ${WUXIAN_SESSION_TTL_DAYS:-30}
      WUXIAN_PAYMENT_MODE: ${WUXIAN_PAYMENT_MODE:-stripe}
      WUXIAN_PAYMENT_WEBHOOK_SECRET: ${WUXIAN_PAYMENT_WEBHOOK_SECRET}
      WUXIAN_LIFETIME_CODES: ${WUXIAN_LIFETIME_CODES}
      WUXIAN_TELEMETRY_RETENTION_DAYS: ${WUXIAN_TELEMETRY_RETENTION_DAYS:-90}
      WUXIAN_RATE_ASSIMILATE_PER_MIN: ${WUXIAN_RATE_ASSIMILATE_PER_MIN:-12}
      WUXIAN_RATE_VIDEO_PER_MIN: ${WUXIAN_RATE_VIDEO_PER_MIN:-6}
      WUXIAN_SHARES_REQUIRE_TOKEN: ${WUXIAN_SHARES_REQUIRE_TOKEN:-1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      REDIS_URL: ${REDIS_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: wuxian-zhi-cockpit
    volumes:
      - wuxian-data:/app/data
      - wuxian-shares:/app/public/shares
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3401/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  nginx:
    image: nginx:1.27-alpine
    container_name: wuxian-nginx
    networks:
      - wuxian-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../web/dist:/usr/share/nginx/html:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/nginx/ssl:ro
    depends_on:
      wuxian-core:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: wuxian-certbot
    networks:
      - wuxian-net
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    profiles:
      - ssl
