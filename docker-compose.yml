version: '3.8'

services:
  wuxian-core:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 设为 0 可去掉 yt-dlp，缩小镜像（视频 URL 同化降级为启发式）
        INSTALL_YTDLP: ${INSTALL_YTDLP:-1}
    container_name: wuxian_operating_system
    ports:
      - "3401:3401"
    environment:
      NODE_ENV: production
      PORT: 3401
      WUXIAN_DATA_DIR: /app/data
      WUXIAN_SHARES_DIR: /app/public/shares
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      WUXIAN_DEEPSEEK_MODEL: ${WUXIAN_DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      WUXIAN_QWEN_VISION_MODEL: ${WUXIAN_QWEN_VISION_MODEL:-qwen-vl-max}
      WUXIAN_CORS_ORIGIN: ${WUXIAN_CORS_ORIGIN:-}
      WUXIAN_PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev-local-secret}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:-}
      WUXIAN_PAYMENT_MODE: ${WUXIAN_PAYMENT_MODE:-simulate}
      WUXIAN_FRONTEND_URL: ${WUXIAN_FRONTEND_URL:-http://localhost:3401}
      WUXIAN_PARENT_LINK_TOKEN: ${WUXIAN_PARENT_LINK_TOKEN:-}
      WECHAT_COMPANION_WEBHOOK_URL: ${WECHAT_COMPANION_WEBHOOK_URL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      WUXIAN_LIFETIME_CODES: ${WUXIAN_LIFETIME_CODES:-}
      WUXIAN_RATE_ASSIMILATE_PER_MIN: ${WUXIAN_RATE_ASSIMILATE_PER_MIN:-12}
      WUXIAN_RATE_VIDEO_PER_MIN: ${WUXIAN_RATE_VIDEO_PER_MIN:-6}
    volumes:
      - ./production_data:/app/data
      - ./static_shares:/app/public/shares
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3401/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
